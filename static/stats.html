<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>URL Stats</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-gray-100 to-gray-200 min-h-screen flex items-center justify-center">

  <!-- Toast -->
  <div id="toast" class="fixed top-5 right-5 bg-gray-900 text-white px-4 py-2 rounded-lg shadow-lg opacity-0 translate-y-2 transition-all duration-300 text-sm">
    Message
  </div>

  <!-- Card -->
  <div class="bg-white shadow-xl rounded-2xl p-8 w-full max-w-md">

    <h1 class="text-2xl font-semibold text-gray-800 mb-1">
      Link Analytics
    </h1>
    <p class="text-gray-500 mb-6">
      Insights for your shortened URL
    </p>

    <!-- Loading -->
    <div id="loading" class="text-gray-500 text-sm">
      Loading stats...
    </div>

    <!-- Content -->
    <div id="content" class="space-y-5 hidden">

      <div>
        <p class="text-sm text-gray-500">Original URL</p>
        <a id="originalUrl" target="_blank" class="text-blue-600 break-words hover:underline"></a>
      </div>

      <div class="flex justify-between items-center bg-gray-50 p-4 rounded-xl">
        <div>
          <p class="text-sm text-gray-500">Total Clicks</p>
          <p id="clickCount" class="text-xl font-semibold text-gray-800"></p>
        </div>
      </div>

      <div>
        <p class="text-sm text-gray-500">Created At</p>
        <p id="createdAt" class="text-gray-800"></p>
      </div>

    </div>

    <!-- Error -->
    <p id="errorMsg" class="mt-4 text-sm text-red-500 hidden"></p>

    <!-- Back -->
    <a href="/" class="block mt-6 text-sm text-blue-600 hover:underline">
      ← Back to home
    </a>

  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get("code");

    const content = document.getElementById("content");
    const loading = document.getElementById("loading");
    const errorMsg = document.getElementById("errorMsg");
    const toast = document.getElementById("toast");

    const originalUrl = document.getElementById("originalUrl");
    const clickCount = document.getElementById("clickCount");
    const createdAt = document.getElementById("createdAt");

    function showToast(message) {
      toast.textContent = message;
      toast.classList.remove("opacity-0", "translate-y-2");
      toast.classList.add("opacity-100", "translate-y-0");

      setTimeout(() => {
        toast.classList.remove("opacity-100", "translate-y-0");
        toast.classList.add("opacity-0", "translate-y-2");
      }, 2000);
    }

    async function loadStats() {
      if (!code) {
        loading.textContent = "";
        errorMsg.textContent = "Missing URL code.";
        errorMsg.classList.remove("hidden");
        return;
      }

      try {
        const res = await fetch(`/api/stats/${code}`);

        if (!res.ok) {
          throw new Error("Failed");
        }

        const data = await res.json();

        originalUrl.href = data.original_url;
        originalUrl.textContent = data.original_url;

        clickCount.textContent = data.counter;
        createdAt.textContent = new Date(data.created_at).toLocaleString();

        loading.classList.add("hidden");
        content.classList.remove("hidden");

        showToast("Stats loaded successfully");

      } catch (err) {
        loading.classList.add("hidden");
        errorMsg.textContent = "Could not load stats.";
        errorMsg.classList.remove("hidden");
        showToast("Error loading stats");
      }
    }

    loadStats();
  </script>

</body>
</html>
