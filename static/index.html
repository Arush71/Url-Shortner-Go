<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>URL Shortener</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-gray-100 to-gray-200 min-h-screen flex items-center justify-center">

  <!-- Toast -->
  <div id="toast" class="fixed top-5 right-5 bg-gray-900 text-white px-4 py-2 rounded-lg shadow-lg opacity-0 translate-y-2 transition-all duration-300 text-sm">
    Copied to clipboard!
  </div>

  <!-- Card -->
  <div class="bg-white shadow-xl rounded-2xl p-8 w-full max-w-md">

    <h1 class="text-2xl font-semibold text-gray-800 mb-1">
      URL Shortener
    </h1>
    <p class="text-gray-500 mb-6">
      Fast. Simple. Clean.
    </p>

    <!-- Input -->
    <div class="flex flex-col gap-3">
      <input
        id="urlInput"
        type="text"
        placeholder="Enter or paste a URL..."
        class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition"
      />

      <button
        id="shortenBtn"
        class="bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition disabled:opacity-50"
      >
        Shorten URL
      </button>
    </div>

    <!-- Result -->
    <div id="resultBox" class="mt-6 hidden animate-fade-in">
      <p class="text-sm text-gray-500 mb-2">Your short URL:</p>

      <div class="flex items-center gap-2">
        <a
          id="resultLink"
          target="_blank"
          class="flex-1 px-3 py-2 border rounded-lg bg-gray-50 text-sm text-blue-600 truncate hover:underline"
        ></a>

        <button
          id="copyBtn"
          class="px-3 py-2 bg-gray-800 text-white rounded-lg hover:bg-gray-900 text-sm"
        >
          Copy
        </button>
      </div>

      <a
        id="statsLink"
        href="#"
        class="block mt-3 text-sm text-blue-600 hover:underline"
      >
        View stats →
      </a>
    </div>

    <!-- Error -->
    <p id="errorMsg" class="mt-4 text-sm text-red-500 hidden"></p>

  </div>

  <script>
    const input = document.getElementById("urlInput");
    const btn = document.getElementById("shortenBtn");
    const resultBox = document.getElementById("resultBox");
    const resultLink = document.getElementById("resultLink");
    const copyBtn = document.getElementById("copyBtn");
    const errorMsg = document.getElementById("errorMsg");
    const statsLink = document.getElementById("statsLink");
    const toast = document.getElementById("toast");

    function showToast(message) {
      toast.textContent = message;
      toast.classList.remove("opacity-0", "translate-y-2");
      toast.classList.add("opacity-100", "translate-y-0");

      setTimeout(() => {
        toast.classList.remove("opacity-100", "translate-y-0");
        toast.classList.add("opacity-0", "translate-y-2");
      }, 2000);
    }

    btn.addEventListener("click", async () => {
      let url = input.value.trim();

      errorMsg.classList.add("hidden");
      resultBox.classList.add("hidden");

      if (!url) {
        errorMsg.textContent = "Please enter a URL.";
        errorMsg.classList.remove("hidden");
        return;
      }

      // Auto-add https
      if (!url.startsWith("http://") && !url.startsWith("https://")) {
        url = "https://" + url;
      }

      btn.disabled = true;
      btn.textContent = "Shortening...";

      try {
        const res = await fetch("/api/shorten", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ url })
        });

        if (!res.ok) {
          throw new Error("Request failed");
        }

        const data = await res.json();

        resultLink.href = data.short_url;
        resultLink.textContent = data.short_url;
        resultBox.classList.remove("hidden");

        const parts = data.short_url.split("/");
        const code = parts[parts.length - 1];
        statsLink.href = `/stats.html?code=${code}`;

        showToast("Short URL created!");

      } catch (err) {
        errorMsg.textContent = "Invalid URL or server error.";
        errorMsg.classList.remove("hidden");
      } finally {
        btn.disabled = false;
        btn.textContent = "Shorten URL";
      }
    });

    copyBtn.addEventListener("click", () => {
      navigator.clipboard.writeText(resultLink.textContent);
      showToast("Copied to clipboard!");
    });

    // Enter key support
    input.addEventListener("keypress", (e) => {
      if (e.key === "Enter") {
        btn.click();
      }
    });
  </script>

</body>
</html>
